### Config File - This file contains the main settings for splitInputs
## Copy to  local_splitInputsCfg.ini and set your parameters
# This file is part of Avaframe.

[GENERAL]
#dependentSeparate or dependentTogether (not in use yet)
splittingMethod = dependentSeparate
#if DEM shall be split
splitDEM = True
#splitting shape; (0=circular),1=cubic (not in use yet)
splittingShape = 1
#the splitting length around each avalanche scenario.
#adjust based on expectation of maximum avalanche horizontal runout distance
bufferSize = 2500
